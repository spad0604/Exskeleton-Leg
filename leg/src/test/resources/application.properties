spring.datasource.url=jdbc:h2:mem:leg-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.http.converters.preferred-json-mapper=jackson2
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/test-migration
app.jwt.secret=a-development-secret-with-more-than-32-bytes
app.jwt.issuer=exoskeleton-leg-api
app.jwt.audience=exoskeleton-leg-mobile
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=2592000
app.cors.allowed-origins=http://localhost:3000
